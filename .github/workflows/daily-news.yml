name: Daily news update

on:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Asia/Tokyo"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: frontier-data-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Collect, rank and summarize the latest 24 hours
        id: collect
        continue-on-error: true
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: >-
          python scripts/update_news.py
          --output public/data/news.json
          --archive-dir public/data/archive
          --archive-index public/data/archive/index.json
          --search-index public/data/archive/search-index.json
          --status-output public/data/status.json
          --stream-output public/data/stream.json
          --stream-status-output public/data/stream-status.json
          --research-output public/data/research.json
          --feed-output public/feed.xml
      - name: Verify daily brief, full stream and research radar
        if: steps.collect.outcome == 'success'
        run: >-
          python -c "import json; p=json.load(open('public/data/news.json', encoding='utf-8'));
          s=json.load(open('public/data/stream.json', encoding='utf-8'));
          r=json.load(open('public/data/research.json', encoding='utf-8'));
          assert p.get('schemaVersion') == 6, p.get('schemaVersion');
          assert p.get('timezone') == 'Asia/Tokyo', p.get('timezone');
          assert p.get('selectionMethod') in ('rules', 'deepseek', 'openai'), p.get('selectionMethod');
          assert p.get('translationStatus') in ('ok', 'partial', 'failed', 'disabled', 'not-configured'), p.get('translationStatus');
          assert len(p.get('items', [])) == 10, len(p.get('items', []));
          assert p.get('translatedItemCount') == sum(bool(x.get('translationProvider')) for x in p['items']);
          assert all(x.get('keyFacts') and x.get('sources') for x in p['items']);
          assert s.get('itemCount') == len(s.get('items', [])) and s.get('itemCount', 0) > 0;
          assert r.get('itemCount') == len(r.get('items', []));
          assert __import__('pathlib').Path('public/feed.xml').exists();
          print('Validated edition', p.get('editionDate'), 'with 10 stories,', s['itemCount'], 'stream items and', r['itemCount'], 'papers')"
      - name: Commit edition, archive and public status
        if: always()
        run: |
          git add -A -- public/data/news.json public/data/status.json public/data/stream.json public/data/stream-status.json public/data/research.json public/data/archive public/feed.xml
          if git diff --cached --quiet; then
            echo "No data change"
            exit 0
          fi
          git config user.name "frontier-pulse-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): refresh daily frontier brief and archive"
          for attempt in 1 2 3; do
            git fetch origin main --depth=20
            # During a rebase, "theirs" is this workflow's generated-data commit.
            if ! git rebase -X theirs origin/main; then
              git rebase --abort || true
              echo "Unable to replay generated data onto the latest main"
              exit 1
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "main changed during push; retrying publication ($attempt/3)"
            sleep "$((attempt * 2))"
          done
          echo "Unable to publish generated data after 3 attempts"
          exit 1
      - name: Send administrator email digest
        if: steps.collect.outcome == 'success'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_SSL: ${{ vars.SMTP_USE_SSL }}
          SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: python scripts/send_digest.py --input public/data/news.json
      - name: Mark failed collection
        if: steps.collect.outcome == 'failure'
        run: |
          echo "The previous edition was retained and public/data/status.json records the failure."
          exit 1
