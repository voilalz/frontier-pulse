name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - ".github/workflows/pages-deployment.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    if: vars.CLOUDFLARE_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check Cloudflare credentials
        shell: bash
        run: test -n "$CLOUDFLARE_API_TOKEN" && test -n "$CLOUDFLARE_ACCOUNT_ID"
      - name: Deploy public directory
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=frontier-pulse --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
