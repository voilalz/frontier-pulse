name: Production smoke test

on:
  schedule:
    - cron: "20 8 * * *"
      timezone: "Asia/Tokyo"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  headers-and-availability:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SITE_URL: ${{ vars.SITE_URL || 'https://frontier-pulse.jiumi674.workers.dev/' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify production security and cache headers
        run: python scripts/check_production.py --site-url "$SITE_URL"
